name: Build and test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Darklove.LocalAI.slnx

      - name: Build
        run: dotnet build Darklove.LocalAI.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Darklove.LocalAI.slnx --configuration Release --no-build
